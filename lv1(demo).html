<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matching Game</title>
    <style>
body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-image: url("images/background.jpg");
    background-repeat: no-repeat;
    background-size: cover;
    margin: 0;
}
.overlay{
    background: rgba(0,0,0,0.3);
    width:100%;
    height:100%;
    position:fixed;
    z-index: 1;
}
.content{
    position: relative;
    z-index: 2;

    display: flex;
    flex-direction: column;
    min-height: 100vh;       
    justify-content: center;
    align-items: center;
}
.gameContainer{
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;

}

.gameBoard{

    display: grid;
    grid-template-columns: repeat(4,100px);
    grid-gap: 10px;
}
.card{
    width: 100px;
    height: 100px;
    background-color: #ffffff;
    border:2px solid #333;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    
    transition: transform 0.5s;
    
}
.card.flipped{
    transform: rotateY(180deg);
}
.card.match .front{

    border-color: green;
    box-shadow: 0 0 10px green;
    cursor: default;
    background-color: lightgreen;
}
.card .front,
.card .back{
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 10px;

}


.card .front{
    background-color: #fff;
}

.card .back{
    background-size: cover;
    background-position: center;
    transform: rotateY(180deg);
}


    </style>
</head>
<body>
    
    <div class="overlay"></div>
    <div class="content">

        <div class="gameContainer">
            <div class="gameBoard">
            </div>
        </div>
    </div>
        
<script src="javascript/lv1.js"></script>

</body>
</html>
